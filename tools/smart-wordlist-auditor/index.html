<!DOCTYPE html>
<html>

<head>
<title>Wordlist Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Custom Wordlist Generator</h1>

<div class="container">

<label>Name</label>

<label>Username</label>
<input type="text" id="username">

<label>Date of Birth</label>

<script src="script.js"></script>

</body>
