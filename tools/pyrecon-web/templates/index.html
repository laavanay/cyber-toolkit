<!DOCTYPE html>
<html>
<head>
<title>PyRecon Tool</title>
<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
margin-top:80px;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

.result{
margin-top:40px;
background:#1e293b;
padding:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>PyRecon - Reconnaissance Tool</h1>

<form method="POST">
<input type="text" name="target" placeholder="Enter domain or IP">
<button type="submit">Scan</button>
</form>

{% if result %}
<div class="result">

<h3>Target</h3>
<p>{{ result.target }}</p>

<h3>Resolved IP</h3>
<p>{{ result.ip }}</p>

<h3>System</h3>
<p>{{ result.system.os }} {{ result.system.version }}</p>

<h3>Open Ports</h3>
<p>{{ result.ports }}</p>

</div>
{% endif %}

</div>

</body>
</html>
